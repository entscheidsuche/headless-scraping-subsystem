# Splice this `location` into the existing files.entscheidsuche.ch vhost.
# DO NOT add a separate server { } block — TLS is already terminated for
# this hostname.
#
# Place inside the existing  server { listen 443 ssl; server_name files.entscheidsuche.ch; ... }

location /headless/ {
    proxy_pass         http://127.0.0.1:8088;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    # The challenge protocol can hold a connection open for the full
    # CHALLENGE_TIMEOUT_S; bump nginx to match (default 60s would cut it).
    proxy_read_timeout  120s;
    proxy_send_timeout  120s;
    proxy_connect_timeout 5s;

    # Bodies can carry base64-encoded HTML (~ a few hundred KB). Allow
    # generous limits.
    client_max_body_size 16M;
    proxy_buffering off;
}
